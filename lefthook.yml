# lefthook.yml
#
# Refer to the lefthook documentation for more info:
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    # --- Backend Hooks ---
    backend-format:
      root: "kifu/backend"
      glob: "*.go"
      stage_fixed: true
      run: gofmt -w {staged_files}

    backend-lint:
      root: "kifu/backend"
      glob: "*.go"
      run: golangci-lint run ./...

    # --- Frontend Hooks ---
    frontend-format:
      root: "kifu/frontend"
      glob: "*.{js,ts,jsx,tsx,svelte.ts}"
      stage_fixed: true
      run: bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}

    frontend-lint:
      root: "kifu/frontend"
      glob: "*.{js,ts,jsx,tsx,svelte,svelte.ts}"
      run: bunx oxlint --no-error-on-unmatched-pattern {staged_files}

    frontend-typecheck:
      root: "kifu/frontend"
      run: bunx tsc --noEmit

pre-push:
  commands:
    # --- Backend Push Hooks ---
    backend-build:
      root: "kifu/backend"
      run: go build ./...

    # --- Frontend Push Hooks ---
    frontend-build:
      root: "kifu/frontend"
      run: bun run build
