# lefthook.yml
#
# Refer to the lefthook documentation for more info:
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    # --- Backend Hooks ---
    backend-format:
      root: "kifu/backend"
      glob: "*.go"
      stage_fixed: true
      run: gofmt -w {staged_files}

    backend-lint:
      root: "kifu/backend"
      glob: "*.go"
      run: golangci-lint run ./...

    # --- Frontend Hooks ---
    frontend-lint:
      root: "kifu/frontend"
      glob: "*.{js,ts,svelte}"
      run: bunx oxlint {staged_files}

    frontend-check:
      root: "kifu/frontend"
      glob: "*.{js,ts,svelte}"
      run: bun run check

pre-push:
  commands:
    # --- Backend Push Hooks ---
    backend-build:
      root: "kifu/backend"
      run: go build ./...

    # --- Frontend Push Hooks ---
    frontend-build:
      root: "kifu/frontend"
      run: bun run build
