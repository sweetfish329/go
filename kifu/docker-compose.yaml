version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kifu-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kifu_store
    ports:
      - "5432:5432"
    volumes:
      - kifu-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kifu_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    container_name: kifu-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: kifu_store
    depends_on:
      db:
        condition: service_healthy

volumes:
  kifu-db-data:
