version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    container_name: kifu-backend
    ports:
      - "8822:8080"
    environment:
      PORT: 8080
      DB_PATH: /data/kifu.db
      JWT_SECRET: kifu-secret-key-1234
      ALLOWED_ORIGIN: http://localhost:8822
      ADMIN_USERNAME: Admin
      ADMIN_PASSWORD: admin-secure-password-here
      ENCRYPTION_KEY: kifu-default-encryption-key-for-oauth
      COOKIE_SECURE: "false"
    volumes:
      - kifu-db-data:/data

volumes:
  kifu-db-data:
