<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/kifu-favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>kifu_store</title>

    <!-- Import Google Icon Font -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Washi Clay Typography Stack — 和紙とクレイ -->
    <!-- Cormorant Garamond: エレガントな英語セリフ (見出し・ブランド) -->
    <!-- Shippori Mincho B1: 品格ある日本語明朝体 (見出し・ブランド) -->
    <!-- DM Sans: モダンな英語サンセリフ (UI・本文) -->
    <!-- Noto Sans JP: 読みやすい日本語ゴシック (UI・本文) -->
    <!-- JetBrains Mono: 等幅フォント (棋譜データ・手数表示) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Shippori+Mincho+B1:wght@400;700&family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Import materialize.css (grid + base utilities) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  </head>
  <body class="grey lighten-4" style="font-family: 'DM Sans', 'Noto Sans JP', sans-serif;">
    <div id="app">
      <!-- 検索エンジン向けの静的なコンテンツ ＆ ロード中のフォールバック -->
      <div class="initial-loading-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; font-family: 'Shippori Mincho B1', 'Noto Sans JP', serif; color: #2e2e2a; padding: 2rem; text-align: center; box-sizing: border-box;">
        <h1 style="font-size: 1.8rem; margin-bottom: 1rem; font-weight: 700; border-bottom: 1.5px solid #2e2e2a; padding-bottom: 8px; display: inline-block;">碁盤・棋譜ストア (kifu_store)</h1>
        <p style="max-width: 480px; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; color: #5f5f59;">
          囲碁の対局をブラウザ上で再生・検討できるツールです。棋譜（SGFファイル）の編集、コメントや変化図の保存、限定公開・一般公開による棋譜共有、そしてSGF形式でのダウンロードをシームレスに行えます。
        </p>
        <div class="spinner" style="border: 2.5px solid #2e2e2a; border-radius: 50%; width: 28px; height: 28px; border-top-color: transparent; animation: spin 0.8s linear infinite; margin-bottom: 12px; box-sizing: border-box;"></div>
        <div style="font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; color: #8e8e88; text-transform: uppercase;">LOADING APPLICATION...</div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <!-- Import materialize.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
